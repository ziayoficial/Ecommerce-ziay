# Prometheus scrape config for ZIAY
# SPRINT-MONITORING-002 · M-11 — Prometheus server config. Together with
# alerts.yml (referenced via `rule_files`) this is everything Prometheus
# needs to scrape the app + chat service and evaluate the alert rules.
#
# Run: `prometheus --config.file=monitoring/prometheus.yml`
# Reload: `POST /-/reload` (or SIGHUP) — Prometheus hot-reloads the
# rule files without dropping scrape state.
#
# SPRINT-MONITORING-FIX-001 · #1 — scrape targets now use the Docker
# Compose service names (`app`, `chat-service`) instead of `localhost`.
# Inside a container, `localhost` resolves to the container itself, so
# the previous config scraped nothing but its own loopback. The
# `alerting.alertmanagers` block pushes evaluated alerts to Alertmanager.
#
# SPRINT-INFRA-FINAL-002 · §4 — added per-job `scrape_timeout` and richer
# labels. The app job (15s interval / 10s timeout) leaves 5s of slack
# before Prometheus considers the target down; the chat-service job
# (30s interval / 5s timeout) is polled less often because its `/health`
# endpoint only flips on socket.io failures. Added `instance: 'app-1'`
# so dashboards can distinguish multiple app replicas once we scale
# horizontally (the `instance` label Prometheus auto-sets from the
# target URL is the same for every replica behind `app:3000`).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'ziay-app'
    metrics_path: '/api/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'ziay'
          env: 'production'
          instance: 'app-1'

  - job_name: 'ziay-chat-service'
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 5s
    static_configs:
      - targets: ['chat-service:3003']
        labels:
          service: 'chat-service'
          env: 'production'
