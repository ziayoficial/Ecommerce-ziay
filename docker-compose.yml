# ───────────────────────────────────────────────────────────────────────────
# CommerceFlow OS — docker-compose.yml
# 11 services: postgres, redis, minio, nocodb, n8n, ollama, uptime-kuma,
#              app, chat-service, caddy, + chat-service-db (sqlite volume).
# Healthchecks, volumes, env_file configured for a self-hosted stack.
# ───────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  commerceflow:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nocodb_data:
  n8n_data:
  ollama_data:
  uptime_kuma_data:
  app_uploads:
  chat_data:
  caddy_data:
  caddy_config:

services:
  # ── 1. PostgreSQL (prod database) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [commerceflow]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commerceflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-commerceflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commerceflow} -d ${POSTGRES_DB:-commerceflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Redis (cache + queues) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [commerceflow]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. MinIO (S3-compatible object storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [commerceflow]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 4. NocoDB (no-code database UI over Postgres) ────────────────────────
  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres?u=${POSTGRES_USER:-commerceflow}&p=${POSTGRES_PASSWORD:-changeme}&d=nocodb"
      NC_PUBLIC_URL: "http://localhost:8080"
    volumes:
      - nocodb_data:/usr/app/data
    ports:
      - "8080:8080"

  # ── 5. n8n (workflow automation) ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-commerceflow}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-commerceflow}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  # ── 6. Ollama (self-hosted LLM) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [commerceflow]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  # ── 7. Uptime Kuma (monitoring) ──────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    networks: [commerceflow]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"

  # ── 8. App (Next.js — CommerceFlow OS) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [commerceflow]
    env_file: [.env]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-commerceflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-commerceflow}?schema=public"
      REDIS_URL: "redis://redis:6379"
      OLLAMA_BASE_URL: "http://ollama:11434"
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 9. Chat service (socket.io mini-service) ─────────────────────────────
  chat-service:
    image: oven/bun:1
    restart: unless-stopped
    networks: [commerceflow]
    working_dir: /app
    env_file: [.env]
    environment:
      CHAT_SERVICE_PORT: "3003"
      CHAT_CORS_ORIGIN: ${CHAT_CORS_ORIGIN:-http://localhost}
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./mini-services/chat-service:/app
      - chat_data:/app/data
    command: ["bun", "--hot", "index.ts"]
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── 10. Caddy (reverse proxy + automatic HTTPS) ──────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      - app
      - chat-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}

  # ── 11. Mailhog (local SMTP capture — dev only) ──────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
