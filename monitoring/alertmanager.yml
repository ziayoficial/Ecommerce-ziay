# Alertmanager configuration for ZIAY
# SPRINT-INFRA-FINAL-001 · Sprint 7A — team-aware alert routing.
#
# Alerts scraped + evaluated by Prometheus (see monitoring/prometheus.yml +
# monitoring/alerts.yml) are pushed to this Alertmanager via the
# `alerting.alertmanagers` block in prometheus.yml. Alertmanager then routes
# each alert to the correct receiver based on its `severity` / `team` labels
# (labels are set in alerts.yml).
#
# Secrets are read from the host environment — set the following on the
# deploy host (or in .env, which docker-compose will pass through):
#   SMTP_PASSWORD            — Gmail app password for alerts@ziay.co
#   PAGERDUTY_ROUTING_KEY    — Events API v2 routing key
#   SLACK_FINANCE_WEBHOOK    — incoming webhook URL for #finance-alerts
#   SLACK_SUPPORT_WEBHOOK    — incoming webhook URL for #support-alerts
#   SLACK_BUSINESS_WEBHOOK   — incoming webhook URL for #business-alerts
#
# Reload: POST /-/reload on the alertmanager container (port 9093) or SIGHUP.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts → PagerDuty immediately
    - match:
        severity: critical
      receiver: 'pagerduty'
      group_wait: 0s
      repeat_interval: 1h

    # Finance team alerts
    - match:
        team: finance
      receiver: 'finance-slack'

    # Support team alerts
    - match:
        team: support
      receiver: 'support-slack'

    # Business team alerts
    - match:
        team: business
      receiver: 'business-slack'

receivers:
  - name: 'default'
    # SPRINT-MONITORING-FIX-001 · #4 — POST every alert to the app's
    # /api/monitoring/alertmanager-webhook endpoint so a `firing` alert
    # auto-creates a StatusIncident row (and a `resolved` alert auto-marks
    # the matching incident as resolved). The endpoint verifies a Bearer
    # token (ALERTMANAGER_WEBHOOK_SECRET) shared with the app; the
    # `${ALERTMANAGER_WEBHOOK_SECRET}` placeholder is expanded by
    # Alertmanager's `--config.expand-env` flag (see docker-compose.yml).
    # The same receiver still emails ops@ziay.co as a fallback.
    webhook_configs:
      - url: 'http://app:3000/api/monitoring/alertmanager-webhook'
        send_resolved: true
        http_config:
          authorization:
            type: 'Bearer'
            credentials: '${ALERTMANAGER_WEBHOOK_SECRET}'
    email_configs:
      - to: 'ops@ziay.co'
        from: 'alerts@ziay.co'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alerts@ziay.co'
        auth_password: '${SMTP_PASSWORD}'

  - name: 'pagerduty'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: critical
        send_resolved: true

  - name: 'finance-slack'
    slack_configs:
      - api_url: '${SLACK_FINANCE_WEBHOOK}'
        channel: '#finance-alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alert }}'
        text: '{{ .CommonAnnotations.summary }}'

  - name: 'support-slack'
    slack_configs:
      - api_url: '${SLACK_SUPPORT_WEBHOOK}'
        channel: '#support-alerts'
        send_resolved: true

  - name: 'business-slack'
    slack_configs:
      - api_url: '${SLACK_BUSINESS_WEBHOOK}'
        channel: '#business-alerts'
        send_resolved: true

inhibit_rules:
  # Don't send warning if critical is firing for same alert
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
