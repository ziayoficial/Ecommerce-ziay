name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bunx vitest run

  # ──────────────────────────────────────────────────────────────────────────
  # openapi-spec job — Sprint 12D. Runs @redocly/cli lint against the
  # OpenAPI spec.
  #
  # Sprint 13B (SPRINT-OPENAPI-FINAL-001): `continue-on-error` flipped from
  # `true` → `false` (strict mode). The spec now carries `operationId` on
  # every operation (136/136), has no `nullable: true` (migrated to the
  # OpenAPI 3.1 `type: [X, 'null']` form), and the remaining stylistic
  # warnings are suppressed via `.redocly.yaml`. The config file is passed
  # explicitly with `--config` because Redocly's auto-discovery only looks
  # for `redocly.yaml` (no leading dot) — keeping the dotfile name matches
  # the task spec and the project's other dotfile conventions.
  #
  # Runs in parallel with lint / typecheck / unit-tests so it doesn't add
  # wall-clock time.
  # ──────────────────────────────────────────────────────────────────────────
  openapi-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - name: Validate OpenAPI spec
        run: npx @redocly/cli lint docs/openapi.yaml --config .redocly.yaml
        # Now strict — operationId + nullable fixes should have cleared errors
        continue-on-error: false

  # ──────────────────────────────────────────────────────────────────────────
  # build job — pushes Prisma schema + runs `next build` against PostgreSQL
  # so migrations are tested against the same DB engine as production.
  # Sprint 5C: previously used SQLite (`file:./test.db`); now uses a real
  # postgres:16-alpine service container matching docker-compose.yml.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ziay_test
          POSTGRES_PASSWORD: ziay_test
          POSTGRES_DB: ziay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ziay_test:ziay_test@localhost:5432/ziay_test
      NEXTAUTH_SECRET: test-secret-for-ci
      ENCRYPTION_KEY: test-encryption-key-for-ci

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install

      - name: Push schema to PostgreSQL
        run: bun run db:push

      - name: Build Next.js app
        run: bun run build

  # ──────────────────────────────────────────────────────────────────────────
  # e2e-tests job — same PostgreSQL service as build; seeds + runs Playwright.
  # Sprint 5C: previously used SQLite; now matches production engine so any
  # PostgreSQL-specific migration (indexes, enums, JSONB) gets exercised.
  # ──────────────────────────────────────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ziay_test
          POSTGRES_PASSWORD: ziay_test
          POSTGRES_DB: ziay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ziay_test:ziay_test@localhost:5432/ziay_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test-secret-for-ci
      ENCRYPTION_KEY: test-encryption-key-for-ci
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install
      - run: bunx playwright install --with-deps chromium

      - name: Push schema to PostgreSQL
        run: bun run db:push

      - name: Build Next.js app
        run: bun run build

      - name: Seed database
        run: bunx prisma db seed

      - name: Run Playwright E2E tests
        run: bunx playwright test
