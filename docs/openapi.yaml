openapi: 3.1.0
info:
  title: ZIAY API
  version: 1.0.0
  description: |
    Comercio Conversacional + Atribución Inteligente.

    Multi-tenant conversational-commerce platform with agent-driven checkout
    (AP2 / UCP / ACP / MCP protocol trinity), ad attribution, compliance
    (Ley 1581 / Ley 2573 / Ley 1480 / DIAN), and a wallet/commission layer
    for traffickers + marketplaces.

    All tenant-scoped endpoints require a session cookie (`sessionAuth`)
    unless marked otherwise. UCP / ACP / webhook endpoints use `bearerAuth`
    or are public.

  contact:
    email: api@ziay.co
  license:
    name: Proprietary

tags:
- name: Auth
  description: Authentication endpoints
- name: Overview
  description: Dashboard overview + KPIs
- name: Orders
  description: Order management
- name: Conversations
  description: WhatsApp/Messenger conversations
- name: Catalog
  description: Product catalog
- name: Ads
  description: Ad attribution + management
- name: Monetization
  description: Commission + invoicing
- name: Wallet
  description: Trafficker wallet + withdrawals
- name: Logistics
  description: Shipping + tracking
- name: Novedades
  description: Post-sale incidents
- name: Marketplace
  description: Cross-brand marketplace
- name: Channels
  description: WhatsApp/Messenger/Instagram channels
- name: Agents
  description: AI agent execution
- name: Protocols
  description: AP2/UCP/ACP/MCP/A2A protocol endpoints
- name: Compliance
  description: KYC + consent + retention + DIAN + retracto
- name: Governance
  description: Mandates + escalations + decisions
- name: Finance
  description: LLM costs + channel contribution
- name: Monitoring
  description: Health + metrics + status
- name: Webhooks
  description: Payment + messaging webhook receivers
- name: Public
  description: Public endpoints (no auth)

x-tagGroups:
- name: Authentication
  tags:
  - Auth
- name: Commerce
  tags:
  - Overview
  - Orders
  - Catalog
  - Channels
- name: Conversations
  tags:
  - Conversations
  - Agents
- name: Marketing
  tags:
  - Ads
  - Marketplace
- name: Finance
  tags:
  - Monetization
  - Wallet
  - Finance
- name: Logistics
  tags:
  - Logistics
  - Novedades
- name: Protocols
  tags:
  - Protocols
- name: Compliance
  tags:
  - Compliance
  - Governance
- name: Operations
  tags:
  - Monitoring
  - Webhooks
  - Public

servers:
- url: https://ziay.co
  description: Production
- url: http://localhost:3000
  description: Development

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth v4 session cookie (set by /api/auth/[...nextauth]/callback/credentials).
    bearerAuth:
      type: http
      scheme: bearer
      description: Signed W3C Verifiable Credential or bearer token (UCP/AP2/ACP).
    cronAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Bearer $CRON_SECRET — shared secret for /api/compliance/retention/cron.'
    webhookSignature:
      type: apiKey
      in: header
      name: X-Hub-Signature-256
      description: HMAC-SHA256 signature from the gateway (Meta/Stripe/Wompi/etc.).

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [error]

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      additionalProperties: true

    PaginatedResponse:
      type: object
      properties:
        nextCursor:
          type:
          - string
          - 'null'
        hasMore:
          type: boolean
      additionalProperties: true

    TenantIdQuery:
      type: object
      properties:
        tenantId:
          type: string
          description: Tenant slug — required on most tenant-scoped endpoints.

    MandateVC:
      type: object
      description: W3C Verifiable Credential for an AP2 Intent / Cart / Payment mandate.
      properties:
        mandateId:
          type: string
        vc:
          type: object
          description: Signed W3C VC payload.
        did:
          type: string
        status:
          type: string
          enum: [active, consumed, revoked]

  parameters:
    TenantId:
      name: tenantId
      in: query
      required: true
      schema:
        type: string
      description: Tenant slug (e.g. "saramantha").
    Days:
      name: days
      in: query
      schema:
        type: integer
        default: 14
      description: Lookback window in days.
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque cursor for cursor-based pagination (id of the last item on the previous page).
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Page size (max 100).

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Tenant access denied.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error (logged to Sentry).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
- sessionAuth: []

paths:
  # ─────────────────────────────────────────────────────────────────────
  # 1. HEALTH & SYSTEM
  # ─────────────────────────────────────────────────────────────────────
  /api:
    get:
      operationId: getApi
      tags: [Monitoring]
      summary: API root / identity
      description: Returns the API name + status. Requires auth.
      security:
      - sessionAuth: []
      responses:
        '200':
          description: API status JSON.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/health:
    get:
      operationId: getHealth
      tags: [Monitoring]
      summary: Full health check (integrations + runtime)
      description: Reports DB, Redis, LLM provider, adapter, webhook, disk, and runtime metrics. Cached 30s. Returns 503
        on overall `error`.
      security: []
      parameters:
      - name: tenantId
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Healthy or warning.
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: Unhealthy (DB down, etc.).

  /api/health/live:
    get:
      operationId: getHealthLive
      tags: [Monitoring]
      summary: Liveness probe
      description: Kubernetes / load balancer liveness. No DB touch.
      security: []
      responses:
        '200':
          description: '{ status: "alive", timestamp }'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/health/ready:
    get:
      operationId: getHealthReady
      tags: [Monitoring]
      summary: Readiness probe
      description: DB + critical integrations ready to serve traffic.
      security: []
      responses:
        '200':
          description: Ready.
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          description: Not ready.

  /api/health/uptime:
    get:
      operationId: getHealthUptime
      tags: [Monitoring]
      summary: Uptime + process metrics
      description: Process uptime, memory, pid, Node version.
      security: []
      responses:
        '200':
          description: Runtime metrics.
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/metrics:
    get:
      operationId: getMetrics
      tags: [Monitoring]
      summary: Prometheus metrics
      description: Prometheus text-format counters + histograms for scraping.
      security: []
      responses:
        '200':
          description: Prometheus text-format body.

  # ─────────────────────────────────────────────────────────────────────
  # 2. AUTH & TENANTS
  # ─────────────────────────────────────────────────────────────────────
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/[...nextauth]:
    get:
      operationId: getAuthNextauth
      tags: [Auth]
      summary: NextAuth handler (GET)
      description: Sign-in pages, session lookup, csrf token.
      security: []
      responses:
        '200':
          description: NextAuth response (HTML/JSON).
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      operationId: createAuthNextauth
      tags: [Auth]
      summary: NextAuth handler (POST)
      description: Credentials sign-in / form submissions / sign-out.
      security: []
      responses:
        '200':
          description: NextAuth response.
        '400':
          $ref: '#/components/responses/BadRequest'
        '302':
          description: Redirect on successful sign-in.

  /api/tenants:
    get:
      operationId: getTenants
      tags: [Public]
      summary: List tenants
      description: Platform admins see all; tenant users see their own.
      security:
      - sessionAuth: []
      responses:
        '200':
          description: Tenant list.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createTenants
      tags: [Public]
      summary: Create tenant (onboarding)
      description: Create a new tenant — platform admin only.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created tenant.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateTenants
      tags: [Public]
      summary: Update tenant config
      description: Update name, currency, country, AI provider, etc.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated tenant.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/public/tenants:
    get:
      operationId: getPublicTenants
      tags: [Public]
      summary: Public tenant directory
      description: Slugs + display names for the login tenant picker. No sensitive fields.
      security: []
      responses:
        '200':
          description: Tenant list (no sensitive fields).

  # ─────────────────────────────────────────────────────────────────────
  # 3. CATALOG & PRODUCTS
  # ─────────────────────────────────────────────────────────────────────
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/catalog/products:
    get:
      operationId: getCatalogProducts
      tags: [Catalog]
      summary: List catalog products
      description: Search + pagination over the tenant's product catalog.
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated product list.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/catalog/send-to-chat:
    post:
      operationId: createCatalogSendToChat
      tags: [Catalog]
      summary: Send product card to chat
      description: Push a product card into an active conversation (chat-up sell flow).
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Send confirmation.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/catalog/sync:
    get:
      operationId: getCatalogSync
      tags: [Catalog]
      summary: Catalog sync status
      description: Last sync status + audit log entry.
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Sync status.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createCatalogSync
      tags: [Catalog]
      summary: Trigger catalog sync
      description: Enqueue a background sync job from the external platform (WooCommerce/Shopify/etc.).
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
      responses:
        '200':
          description: Sync job status.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/public/catalog:
    get:
      operationId: getPublicCatalog
      tags: [Public]
      summary: Public catalog endpoint
      description: Product list for storefront / AI agent discovery (no auth).
      security: []
      parameters:
      - name: tenantId
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Catalog product list.
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/product-enrichment:
    get:
      operationId: getProductEnrichment
      tags: [Catalog]
      summary: List product enrichments + pending
      description: Existing ProductEnrichment rows + products that still lack enrichment.
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: '{ enrichments, pending }'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createProductEnrichment
      tags: [Catalog]
      summary: Enrich a product (VLM)
      description: Call the VLM (glm-4.6v) to analyze the product image and upsert ProductEnrichment.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
                sku:
                  type: string
      responses:
        '200':
          description: Enriched product data.
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─────────────────────────────────────────────────────────────────────
  # 4. ORDERS & OVERVIEW
  # ─────────────────────────────────────────────────────────────────────
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/orders:
    get:
      operationId: getOrders
      tags: [Orders]
      summary: List orders (cursor-paginated)
      description: Filter by status / mode / search query. Cursor-based pagination (max 100).
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: status
        in: query
        schema:
          type: string
      - name: mode
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated orders + nextCursor + hasMore.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/orders/{id}:
    patch:
      operationId: updateOrdersById
      tags: [Orders]
      summary: Update order
      description: Update status / payment status. Optional `event` is recorded atomically in a transaction.
      security:
      - sessionAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                paymentStatus:
                  type: string
                paidAt:
                  type: string
                  format: date-time
                paymentGateway:
                  type: string
                paymentRef:
                  type: string
                event:
                  type: string
                note:
                  type: string
      responses:
        '200':
          description: Updated order.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/overview:
    get:
      operationId: getOverview
      tags: [Overview]
      summary: Dashboard overview KPIs
      description: Revenue, orders, conversations, ads KPIs for a tenant + date range.
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/Days'
      responses:
        '200':
          description: KPI aggregates + breakdowns.

  # ─────────────────────────────────────────────────────────────────────
  # 5. CONVERSATIONS & AI REPLY
  # ─────────────────────────────────────────────────────────────────────
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/conversations:
    get:
      operationId: getConversations
      tags: [Conversations]
      summary: List conversations (cursor-paginated)
      description: Filter by status / channel / search query.
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: status
        in: query
        schema:
          type: string
      - name: channel
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated conversations + nextCursor + hasMore.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createConversations
      tags: [Conversations]
      summary: Send a conversation message
      description: Routes through conversationService so WhatsApp adapter delivers + TTR is stamped.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                body:
                  type: string
                direction:
                  type: string
                  enum: [inbound, outbound]
      responses:
        '200':
          description: Created message.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/conversations/{id}:
    get:
      operationId: getConversationsById
      tags: [Conversations]
      summary: Fetch conversation detail
      description: Single conversation with messages + customer + channel context.
      security:
      - sessionAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Conversation detail.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateConversationsById
      tags: [Conversations]
      summary: Update conversation
      description: Update status / priority / assignee.
      security:
      - sessionAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated conversation.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/ai-reply:
    post:
      operationId: createAiReply
      tags: [Agents]
      summary: Generate AI draft reply
      description: Generate an AI draft reply for a conversation message (uses the tenant's LLM adapter).
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: AI-generated draft reply.

  # ─────────────────────────────────────────────────────────────────────
  # 6. CHANNELS & INTEGRATIONS
  # ─────────────────────────────────────────────────────────────────────
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/channels:
    get:
      operationId: getChannels
      tags: [Channels]
      summary: List channels
      description: List channels for a tenant. Tokens are masked (hasToken flags only).
      security:
      - sessionAuth: []
      parameters:
      - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Channel list with masked credentials.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createChannels
      tags: [Channels]
      summary: Create channel
      description: Add a new channel (WhatsApp / Messenger / Instagram / Telegram). Validates per-type required fields.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: string
                type:
                  type: string
                  enum: [whatsapp, messenger, instagram, telegram]
                name:
                  type: string
                displayName:
                  type: string
      responses:
        '201':
          description: Created channel.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateChannels
      tags: [Channels]
      summary: Update channel
      description: Update a channel (e.g., rotate credentials). Tenant ownership verified.
      security:
      - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channelId:
                  type: string
      responses:
        '200':
          description: Updated channel.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteChannels
      tags: [Channels]
      summary: Deactivate channel (soft delete)
      description: Soft-delete a channel — preserves conversation history.
      security:
      - sessionAuth: []
      parameters:
      - name: channelId
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deactivated channel id.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/integrations/credentials:
    get:
      operationId: getIntegrationsCredentials
      tags: [Channels]
      summary: List integration credentials (masked)
      description: List credential Setting rows (`cred::*` keys) with masked values.
      security:
      - sessionAuth: []
      responses:
