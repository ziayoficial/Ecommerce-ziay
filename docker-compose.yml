# ───────────────────────────────────────────────────────────────────────────
# CommerceFlow OS — docker-compose.yml
# 11 services: postgres, redis, minio, nocodb, n8n, ollama, uptime-kuma,
#              app, chat-service, caddy, + chat-service-db (sqlite volume).
# Healthchecks, volumes, env_file configured for a self-hosted stack.
# ───────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  commerceflow:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nocodb_data:
  n8n_data:
  ollama_data:
  uptime_kuma_data:
  app_uploads:
  chat_data:
  caddy_data:
  caddy_config:
  # Sprint 7A — monitoring stack volumes
  prometheus_data:
  grafana_data:
  # SPRINT-MONITORING-FIX-001 · #3 — Loki chunk + index storage.
  loki_data:

services:
  # ── 1. PostgreSQL (prod database) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [commerceflow]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commerceflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-commerceflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commerceflow} -d ${POSTGRES_DB:-commerceflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Redis (cache + queues) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [commerceflow]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. MinIO (S3-compatible object storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [commerceflow]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── 4. NocoDB (no-code database UI over Postgres) ────────────────────────
  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres?u=${POSTGRES_USER:-commerceflow}&p=${POSTGRES_PASSWORD:-changeme}&d=nocodb"
      NC_PUBLIC_URL: "http://localhost:8080"
    volumes:
      - nocodb_data:/usr/app/data
    ports:
      - "8080:8080"

  # ── 5. n8n (workflow automation) ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-commerceflow}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-commerceflow}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  # ── 6. Ollama (self-hosted LLM) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [commerceflow]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  # ── 7. Uptime Kuma (monitoring) ──────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    networks: [commerceflow]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"

  # ── 8. App (Next.js — CommerceFlow OS) ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [commerceflow]
    env_file: [.env]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-commerceflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-commerceflow}?schema=public"
      REDIS_URL: "redis://redis:6379"
      OLLAMA_BASE_URL: "http://ollama:11434"
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 9. Chat service (socket.io mini-service) ─────────────────────────────
  # Sprint 7A: switched from the bind-mount `bun --hot` dev mode to a
  # multi-stage production build (mini-services/chat-service/Dockerfile).
  # Build context is the repo root so the Dockerfile's COPY paths (which
  # reference mini-services/chat-service/*) resolve correctly.
  chat-service:
    build:
      context: .
      dockerfile: mini-services/chat-service/Dockerfile
    restart: unless-stopped
    networks: [commerceflow]
    env_file: [.env]
    environment:
      CHAT_SERVICE_PORT: "3003"
      CHAT_CORS_ORIGIN: ${CHAT_CORS_ORIGIN:-http://localhost}
      REDIS_URL: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - chat_data:/app/data
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── 10. Caddy (reverse proxy + automatic HTTPS + rate-limit) ─────────────
  # Sprint 5C: switched from the upstream `caddy:2-alpine` image to a custom
  # build (Dockerfile.caddy) that bakes in the mholt/caddy-ratelimit module
  # so the `rate_limit` directive in Caddyfile is honoured at runtime.
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    networks: [commerceflow]
    depends_on:
      - app
      - chat-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}

  # ── 11. Mailhog (local SMTP capture — dev only) ──────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # ── 12. Prometheus (metrics scrape + alert evaluation) ───────────────────
  # Sprint 7A — pulls metrics from /api/metrics on the app + chat service
  # every 15s, evaluates alerts.yml rules, fires alerts to Alertmanager.
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # ── 13. Alertmanager (alert routing → PagerDuty / Slack / email) ──────────
  # Sprint 7A — receives alerts from Prometheus and routes them to the
  # correct receiver based on the severity / team labels set in alerts.yml.
  #
  # SPRINT-MONITORING-FIX-001 · #2 — added `--config.expand-env` (Alertmanager
  # ≥ 0.22) so `${SMTP_PASSWORD}` / `${PAGERDUTY_ROUTING_KEY}` / Slack
  # webhooks in alertmanager.yml are expanded from the container's env vars
  # (passed through from the host .env via the `environment:` block below).
  # Without the flag, Alertmanager loads the literal `${SMTP_PASSWORD}` string
  # and every email/pagerduty/slack notification silently fails.
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--config.expand-env'
    environment:
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - SLACK_FINANCE_WEBHOOK=${SLACK_FINANCE_WEBHOOK:-}
      - SLACK_SUPPORT_WEBHOOK=${SLACK_SUPPORT_WEBHOOK:-}
      - SLACK_BUSINESS_WEBHOOK=${SLACK_BUSINESS_WEBHOOK:-}
      - ALERTMANAGER_WEBHOOK_SECRET=${ALERTMANAGER_WEBHOOK_SECRET:-}

  # ── 14. Grafana (dashboards) ──────────────────────────────────────────────
  # Sprint 7A — auto-provisioned datasources (Prometheus + Loki) and the
  # ZIAY overview dashboard from monitoring/grafana-dashboard.json. Admin
  # password is configurable via $GRAFANA_ADMIN_PASSWORD (default: admin).
  #
  # SPRINT-MONITORING-FIX-001 · #5 — host port changed 3001 → 3002 to
  # avoid a conflict with uptime-kuma, which already binds 3001:3001.
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "3002:3000"  # Changed from 3001 to avoid conflict with uptime-kuma
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/ziay-overview.json:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
      - loki

  # ── 15. Loki (log aggregation) ────────────────────────────────────────────
  # SPRINT-MONITORING-FIX-001 · #3 — receives structured log streams pushed
  # by Promtail (job #16 below) and exposes them to Grafana via the
  # `loki` datasource (already provisioned in grafana-datasource.yml).
  # Default `local-config.yaml` keeps retention modest; for prod swap in
  # a boltdb-shipper config with S3 chunks backend.
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    networks: [commerceflow]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # ── 16. Promtail (log shipper → Loki) ─────────────────────────────────────
  # SPRINT-MONITORING-FIX-001 · #3 — discovers containers via the Docker
  # socket, extracts the `level` JSON field as a Loki label (so dashboards
  # can filter error vs. info logs), and tags every stream with the source
  # container name. Config lives in monitoring/promtail.yml.
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    networks: [commerceflow]
    volumes:
      - /var/log:/var/log
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
